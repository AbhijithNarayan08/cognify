name: Verify Pull Request

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Tests
        run: npm run test

  validate-build:
    name: Build & Configuration Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Validate Expo Configuration
        run: npx expo doctor

      - name: Compile Translation Catalogs
        run: npm run strings

      - name: Verify String Translation Sync
        run: |
          if [ -n "$(git status --porcelain src/constants/stringsData.js)" ]; then
            echo "::error::stringsData.js is out of sync with strings.csv! Please run 'npm run strings' locally and commit the compiled changes."
            git diff src/constants/stringsData.js
            exit 1
          fi

      - name: Verify Metro Web Bundling Export
        run: npx expo export -p web

      - name: Verify Insights Pipeline Integrity
        run: node scripts/verifyInsights.js
